<!DOCTYPE html>
<html lang="en">
<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>View Poster</title>
	<style>
		body, html {
			margin: 0;
			padding: 0;
			height: 100%;
			overflow: hidden;
		}
		iframe{
			width: 100%;
			height: 100%;
			border: none;
		}
	</style>
</head>
<body>

	<iframe src="my-poster.pdf" type="application/pdf">
		<p>Your browser does not support embedded PDFS :( <a href="my-poster.pdf">Click here to download and view instead! </a>
		</p>
	</iframe>

</body>
</html>
